<tr class="crew-row-display" data-project-id="{{ record.id }}">
    <td class="icon-col">
        <button
            class="edit-icon"
            hx-get="/crew/projects/{{ record.id }}/edit-form"
            hx-target="closest tr"
            hx-swap="outerHTML"
            title="Edit project"
        >✏</button>
        <button
            class="detail-icon"
            title="Project details"
            disabled
        >⋯</button>
    </td>
    <td>{{ record["name"] }}</td>
    <td>{{ record["type"] or "—" }}</td>
    <td>{{ record["status"] }}</td>
</tr>
