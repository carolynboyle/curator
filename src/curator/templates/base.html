<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_title | default("Curator") }}{% endblock %}</title>

    <!-- Curator base styles -->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">

    <!-- Component styles -->
    <link rel="stylesheet" href="/static/css/components/navbar.css">
    <link rel="stylesheet" href="/static/css/components/card.css">
    <link rel="stylesheet" href="/static/css/components/table.css">
    <link rel="stylesheet" href="/static/css/components/empty-state.css">
    <link rel="stylesheet" href="/static/css/components/forms.css">
    <link rel="stylesheet" href="/static/css/components/buttons.css">
    <link rel="stylesheet" href="/static/css/components/tabs.css">
    <link rel="stylesheet" href="/static/css/components/datasheet.css">
    <link rel="stylesheet" href="/static/css/components/identity.css">
    <link rel="stylesheet" href="/static/css/components/detail-panel.css">


    <!-- Tabulator data grid — simple theme (grid lines) + compact overrides -->
    <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.5.0/dist/css/tabulator_simple.min.css">
    <link rel="stylesheet" href="/static/css/components/tabulator-overrides.css">

    <!-- Theme -->
    <link rel="stylesheet" href="/static/css/themes/{{ theme | default('light') }}.css">

    <!-- Crew workspace palettes -->
    <link rel="stylesheet" href="/static/css/crew/captain.css">
    <link rel="stylesheet" href="/static/css/crew/scribe.css">
    <link rel="stylesheet" href="/static/css/crew/mechanic.css">
    <link rel="stylesheet" href="/static/css/crew/envoy.css">
    </head>
    
    
<body>
    <!-- Save/Discard confirmation dialog — used by datasheet.js -->
    <dialog id="datasheet-dialog">
        <div class="ds-dialog-inner">
            <p class="ds-dialog-title">Unsaved Changes</p>
            <p class="ds-dialog-message">Save changes to this row before continuing?</p>
            <div class="ds-dialog-actions">
                <button class="ds-dialog-discard">Discard</button>
                <button class="ds-dialog-save">Save</button>
            </div>
        </div>
    </dialog>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="/">{{ site_icon | default("🎭") }} {{ site_title | default("Curator") }}</a>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
            </ul>
        </div>
    </nav>

    <main class="curator-main">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Project Crew. All hands on deck.</p>
    </footer>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Tabulator data grid -->
    <script src="https://unpkg.com/tabulator-tables@6.5.0/dist/js/tabulator.min.js"></script>

    <!-- Detail panel — tab switching, open/close, form save -->
    <script type="module" src="/static/js/detail-panel.js"></script>
</body>
</html>
